version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: mysql_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: school_management_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
